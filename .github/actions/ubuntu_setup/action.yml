name: Ubuntu common
description: Setup Ubuntu environment

runs:
  using: "composite"
  steps:
    - name: Install Ubuntu packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install libnotify4 libsdl2-2.0-0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: pip
    
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04/wxpython-4.2.5-cp314-cp314-linux_x86_64.whl
        pip install -r requirements.txt

    - name: Set PYTHONPATH to repo root
      shell: bash
      run: |
        echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
